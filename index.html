
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kankshree Creation</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

header{
padding:25px;
background:#000;
border-bottom:2px solid #d4af37;
}

header img{
width:100px;
}

h1,h2{
color:#d4af37;
}

.hero img{
width:90%;
max-width:600px;
border-radius:15px;
margin:20px;
}

.card{
width:90%;
max-width:600px;
margin:20px auto;
padding:20px;
border:1px solid #d4af37;
border-radius:15px;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.gallery img{
width:100%;
height:150px;
object-fit:cover;
border-radius:15px;
border:1px solid #d4af37;
}

button{
background:#d4af37;
color:black;
padding:12px 25px;
border:0;
border-radius:20px;
font-size:16px;
}

footer{
padding:20px;
background:#000;
color:#aaa;
}
</style>

</head>

<body>

<header>
<img src="logo.png">
<h1>Kankshree Creation</h1>
<p>Premium Collection</p>
</header>

<section class="hero">
<img src="banner.jpg">
</section>

<div class="card">
<h2>Our Products</h2>
<p>Latest designs and premium quality products.</p>
</div>

<h2>Gallery</h2>

<div class="gallery">
<img src="product1.jpg">
<img src="product2.jpg">
<img src="product3.jpg">
<img src="product4.jpg">
</div>

<br>

<a href="https://www.instagram.com/kankshreecreation477">
<button>Contact Us</button>
</a>

<footer>
<p>© Kankshree Creation</p>
</footer>

</body>
</html>
